<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expense Vision AI</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            color: #1f2937;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 22px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 34px;
            color: #111827;
        }

        .subtitle {
            margin-bottom: 24px;
            color: #6b7280;
            font-size: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 14px;
        }

        button {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.94;
        }

        .error {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .demo-box {
            margin-top: 18px;
            padding: 14px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            color: #475569;
        }

        .demo-box strong {
            color: #111827;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Expense Vision AI</h1>
        <div class="subtitle">Login to access your dashboard</div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Login</button>
        </form>

        <div class="demo-box">
            <div><strong>Demo Username:</strong> admin</div>
            <div><strong>Demo Password:</strong> 1234</div>
        </div>
    </div>
</body>
</html>
